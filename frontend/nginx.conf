# STEP 15 — Nginx Configuration
#
# Nginx does two things here:
#
# 1. Serve React static files
#    → All requests go to index.html (React Router handles it)
#    → "try_files $uri /index.html" is critical for React Router to work
#      Without this, refreshing /history would give a 404 from Nginx
#
# 2. Proxy /api/ requests to Django
#    → React makes a request to /api/v1/analyze/
#    → Nginx forwards it to http://refund-api:8000/api/v1/analyze/
#    → "refund-api" is the Docker container name — containers can reach each other by name
#
# Rate Limiting:
#    → limit_req_zone defines a shared memory zone tracking requests per IP
#    → "api_limit" zone: 10MB memory, 10 requests/second per IP
#    → "analyze_limit" zone: 10MB memory, 2 requests/second per IP (stricter for AI endpoint)
#    → burst: allows short spikes above the rate before rejecting
#    → nodelay: reject immediately once burst is exceeded (no queuing)

# General API rate limit — 10 req/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Strict limit for the AI analyze endpoint — 2 req/sec per IP
limit_req_zone $binary_remote_addr zone=analyze_limit:10m rate=2r/s;

# Return 429 Too Many Requests (not nginx default 503)
limit_req_status 429;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React app — serve index.html for any unknown route (React Router handles it)
    location / {
        try_files $uri /index.html;
    }

    # Strict rate limit on the AI analyze endpoint
    location /api/v1/analyze/ {
        limit_req zone=analyze_limit burst=5 nodelay;

        proxy_pass         http://refund-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # General rate limit on all other API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://refund-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
